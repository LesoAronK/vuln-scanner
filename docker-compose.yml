version: "3.9"

services:
  vuln-scanner:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./reports:/app/reports
    environment:
      - NODE_ENV=production
      - PORT=5000
    # nmap OS detection and SYN scan require NET_RAW + NET_ADMIN
    cap_add:
      - NET_RAW
      - NET_ADMIN
    restart: unless-stopped
